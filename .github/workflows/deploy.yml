name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права для публикации на Pages через GitHub Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать параллельные деплои; текущий не прерываем.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        # Ставит зависимости (pnpm определяется по pnpm-lock.yaml),
        # собирает сайт и загружает dist/ как Pages-артефакт.
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
