# ПАМЯТЬ: места, где гулял мышонок.
# Ключ = id: английское название места (lowercase, без пробелов), стабильное для всех языков.
# На него ссылается сказка (поле place) и URL (/places/meadow).
# Поля: name, emoji, whatIsIt (что это за место), facts[].
# ВАЖНО: если в строке есть двоеточие, # или кавычки — бери её в "двойные кавычки".

meadow:
  name: Луг
  emoji: 🌼
  whatIsIt: большое открытое поле, где растёт высокая трава и цветут цветы
  facts:
    - Трава здесь высокая и тёплая от солнышка.
    - Над цветами весь день кто-нибудь порхает.
    - По вечерам тут поёт весь луг.
