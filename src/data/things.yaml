# ПАМЯТЬ: вещи и явления, которые узнал мышонок.
# Ключ = id: английское название (lowercase), стабильное для всех языков.
# На него ссылаются сказки (поле things) и URL (/things/spiderweb).
# Поля: name, emoji, whatIsIt, learnedFrom (id персонажа, который объяснил),
#        firstInStory, facts[], leadsToCharacter (имя ещё не встреченного существа,
#        которое мельком упомянули — будущее знакомство; необязательно).

snail-trail:
  name: Серебристый след
  emoji: ✨
  whatIsIt: Блестящий след, который улитка оставляет на листьях, когда ползёт
  learnedFrom: snail
  firstInStory: 1
  facts:
    - Улитка оставляет его всюду, где проползёт.
    - По следу всегда можно найти, где побывала улитка.
    - На солнышке он поблёскивает серебром.

shell:
  name: Раковина
  emoji: 🐚
  whatIsIt: Круглый завиток-домик, который улитка носит на спинке и прячется внутрь
  learnedFrom: snail
  firstInStory: 1
  facts:
    - Улитка всюду носит её с собой.
    - Внутри можно спрятаться от любой беды.
    - Она круглая, закручена завитком.

spiderweb:
  name: Паутина
  emoji: 🕸️
  whatIsIt: Тонкие липкие нити, натянутые между травинками
  learnedFrom: grasshopper
  firstInStory: 2
  leadsToCharacter: Паук
  facts:
    - Это липкие нити — в них легко запутаться.
    - Плетёт её паук, мастер на восьми ножках.
    - С паутиной нужно быть поосторожнее.
