# ПАМЯТЬ: существа, с кем мышонок познакомился (не только друзья — любые живые существа).
# Ключ = id: английское название существа (lowercase, без пробелов), стабильное для всех языков.
# На него ссылаются сказки (поле characters) и URL (/creatures/grasshopper).
# Поля: name, emoji, appearance (как выглядит глазами мышонка),
#        home, metInStory (номер сказки знакомства), status, facts[].
# ВАЖНО: если в строке есть двоеточие, # или кавычки — бери её в "двойные кавычки".

snail:
  name: Улитка
  emoji: 🐌
  appearance: Маленькая и мягкая, на спинке носит круглый домик-завиток, будто ракушку; на голове два тоненьких рожка с глазками; ползёт медленно-медленно
  home: в камышах у воды, где сыро и прохладно
  metInStory: 1
  status: друг
  facts:
    - Всюду носит свой домик на спинке и прячется в него, когда устанет или испугается.
    - Ползёт медленно и никогда не торопится.
    - Оставляет за собой серебристый след.

grasshopper:
  name: Кузнечик
  emoji: 🦗
  appearance: Длинный и тоненький, весь зелёный, как травинка; длинные задние ножки сложены уголком, будто пружинки; усики тоньше нити
  home: на лугу, в высокой траве
  metInStory: 2
  status: друг
  facts:
    - Прыгает с травинки на травинку — ножки у него как пружинки.
    - "Умеет петь: трёт крылышком о крылышко, и получается «стрек-стрек»."
    - По вечерам поёт вместе со всем лугом.
