services:
  # Прод-режим: собрать проект и раздать готовую статику (astro preview).
  #   docker compose up --build
  #   → http://localhost:4321/mouse-tales/
  web:
    build:
      context: .
      target: preview
    ports:
      - "4321:4321"
    restart: unless-stopped

  # Режим разработки с live-reload. Запуск отдельным профилем:
  #   docker compose --profile dev up dev
  #   → http://localhost:4321/mouse-tales/
  dev:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4321"
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    profiles: ["dev"]
